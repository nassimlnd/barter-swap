root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/barterswap ."
  bin = "./tmp/barterswap"
  include_ext = ["go"]
  exclude_dir = ["tmp", "testdata", "docs", "api", "migrations", ".git"]
  exclude_regex = ["_test\\.go$"]
  delay = 500
  stop_on_error = true
  send_interrupt = true
  kill_delay = "2s"

[log]
  time = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
