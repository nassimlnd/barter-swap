services:
  db:
    image: postgres:16-alpine
    container_name: barterswap_db
    environment:
      POSTGRES_USER: barter
      POSTGRES_PASSWORD: barter
      POSTGRES_DB: barterswap
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barter -d barterswap"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: barterswap_api
    environment:
      DATABASE_URL: postgres://barter:barter@db:5432/barterswap?sslmode=disable
      PORT: "8080"
      LOG_LEVEL: info
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
